services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: home_agent_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: home_agent
      POSTGRES_PASSWORD: home_agent
      POSTGRES_DB: home_agent
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U home_agent -d home_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: home_agent_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ENVIRONMENT: dev
      DEBUG: "true"
      DATABASE_URL: postgresql+asyncpg://home_agent:home_agent@postgres:5432/home_agent
      CORS_ORIGINS: '["http://localhost:5173"]'
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  pg_data:
